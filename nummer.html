<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: #ff4040;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            text-align: center;
            margin: 0;
            padding: 40px 16px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .current {
            font-size: 64px;
            letter-spacing: 4px;
            color: #ff4040;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #cc0000;
            margin: 0 0 32px 0;
            line-height: 1;
        }
        .current .unit {
            font-size: 32px;
            opacity: 0.7;
            margin-left: 4px;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin: 0 auto;
        }
        input[type=number] {
            font-family: inherit;
            font-size: 40px;
            text-align: center;
            background: black;
            color: #5dd95d;
            border: 2px solid #5dd95d;
            box-shadow: 0 0 8px #2a8a2a;
            padding: 8px 12px;
            width: 200px;
            letter-spacing: 4px;
            outline: none;
        }
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
        textarea {
            font-family: inherit;
            font-size: 22px;
            text-align: center;
            background: black;
            color: #5dd95d;
            border: 2px solid #5dd95d;
            box-shadow: 0 0 8px #2a8a2a;
            padding: 10px 12px;
            width: 320px;
            max-width: 90vw;
            line-height: 1.3;
            min-height: calc(22px * 1.3 * 10);
            letter-spacing: 2px;
            outline: none;
            resize: vertical;
        }
        .section-divider {
            width: 60%;
            max-width: 320px;
            margin: 40px auto 24px auto;
            border: 0;
            border-top: 1px dashed #5a1010;
        }
        .section-label {
            font-size: 22px;
            letter-spacing: 4px;
            color: #ff6060;
            text-shadow: 0 0 6px #cc0000;
            margin: 0 0 16px 0;
        }
        button {
            font-family: inherit;
            font-size: 22px;
            letter-spacing: 3px;
            background: black;
            color: #ff4040;
            border: 2px solid #e62828;
            box-shadow: 0 0 8px #8a1010;
            padding: 10px 22px;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover, button:focus {
            background: #200000;
            outline: none;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="current"><span id="current">--</span><span class="unit">%</span></div>
    <form id="form">
        <input type="number" id="value" min="0" max="100" step="0.1" required>
        <button type="submit" id="submit">SET</button>
    </form>

    <hr class="section-divider">
    <div class="section-label">MESSAGE</div>
    <form id="message-form">
        <textarea id="message-value" placeholder="Enter message..."></textarea>
        <button type="submit" id="message-submit">SET MESSAGE</button>
    </form>

    <script>
        try {
            const nav = performance.getEntriesByType('navigation')[0];
            if (nav && nav.transferSize === 0) {
                const url = new URL(location.href);
                url.searchParams.set('_cb', Date.now());
                location.replace(url.toString());
            }
        } catch (e) {}
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) location.reload();
        });

        const KVDB_URL = 'https://kvdb.io/FbDzaTikbRwrN5i2ruzK9J/progress';
        const KVDB_MESSAGE_URL = 'https://kvdb.io/FbDzaTikbRwrN5i2ruzK9J/message';
        const currentEl = document.getElementById('current');
        const valueEl = document.getElementById('value');
        const submitEl = document.getElementById('submit');
        const form = document.getElementById('form');
        const messageValueEl = document.getElementById('message-value');
        const messageSubmitEl = document.getElementById('message-submit');
        const messageForm = document.getElementById('message-form');

        async function loadCurrent() {
            try {
                const r = await fetch(KVDB_URL + '?_=' + Date.now(), { cache: 'no-store' });
                if (r.ok) {
                    const v = parseFloat((await r.text()).trim());
                    if (!isNaN(v)) {
                        currentEl.textContent = v;
                        valueEl.value = v;
                    }
                }
            } catch (e) {}
        }

        async function setValue(v) {
            v = Math.max(0, Math.min(100, parseFloat(v)));
            if (isNaN(v)) return;
            submitEl.disabled = true;
            try {
                const r = await fetch(KVDB_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'text/plain' },
                    body: String(v)
                });
                if (r.ok) {
                    currentEl.textContent = v;
                    valueEl.value = v;
                }
            } catch (e) {
            } finally {
                submitEl.disabled = false;
            }
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            setValue(valueEl.value);
        });

        async function loadMessage() {
            try {
                const r = await fetch(KVDB_MESSAGE_URL + '?_=' + Date.now(), { cache: 'no-store' });
                if (r.ok) {
                    messageValueEl.value = await r.text();
                } else if (r.status === 404) {
                    messageValueEl.value = '';
                }
            } catch (e) {}
        }

        async function setMessage(text) {
            messageSubmitEl.disabled = true;
            try {
                const r = await fetch(KVDB_MESSAGE_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'text/plain' },
                    body: text
                });
                if (r.ok) {
                    messageValueEl.value = text;
                }
            } catch (e) {
            } finally {
                messageSubmitEl.disabled = false;
            }
        }

        messageForm.addEventListener('submit', function(e) {
            e.preventDefault();
            setMessage(messageValueEl.value);
        });

        loadCurrent();
        loadMessage();
        setInterval(loadCurrent, 15000);
        setInterval(loadMessage, 15000);
    </script>
</body>
</html>
