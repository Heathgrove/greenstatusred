<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: #ff4040;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            text-align: center;
            margin: 0;
            padding: 40px 16px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 36px;
            margin: 0 0 32px 0;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #cc0000;
        }
        a.edit-link {
            display: inline-block;
            font-size: 26px;
            letter-spacing: 3px;
            color: #ff4040;
            background: black;
            border: 2px solid #e62828;
            box-shadow: 0 0 10px #8a1010;
            padding: 16px 28px;
            text-decoration: none;
            text-shadow: 0 0 6px #cc0000;
        }
        a.edit-link:hover, a.edit-link:focus {
            background: #200000;
            outline: none;
        }
        .hint {
            margin-top: 28px;
            font-size: 16px;
            letter-spacing: 1px;
            color: #aa3030;
            line-height: 1.5;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <h1>STATUS CONTROL</h1>
    <a class="edit-link" href="https://jsonblob.com/019ddde2-733b-7d83-a878-07526e01a88b" target="_blank" rel="noopener">EDIT PROGRESS</a>
    <div class="hint">
        Set the value of <code>"progress"</code> to a number between 0 and 100, then click "Update".
    </div>
</body>
</html>
