<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Status Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: red;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            text-align: center;
            margin: 0;
            padding-top: 20px;
        }
        h1 {
            font-size: 160px;
            margin: 0 0 22px 0;
            animation: claxon 0.5s infinite alternate ease-in-out;
        }
        @keyframes claxon {
            from {
                color: #901818;
                text-shadow:
                    0 0 10px #a81818,
                    0 0 22px #600000;
            }
            to {
                color: #d83030;
                text-shadow:
                    0 0 8px #ff3030,
                    0 0 25px #e02020,
                    0 0 60px #b00000,
                    0 0 110px #800000,
                    0 0 170px #500000;
            }
        }
        .subtitle {
            font-size: 44px;
            letter-spacing: 3px;
            color: #ff4040;
            margin: 0 0 65px 0;
            text-shadow: 0 0 6px #cc0000;
            line-height: 1.1;
        }
        #subtitle-1, #subtitle-2 {
            display: inline-block;
        }
        #subtitle-2 {
            transform-origin: center;
        }
        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            width: 96%;
            margin: 0 auto;
            position: relative;
        }
        .row img {
            height: 100px;
            width: auto;
        }
        .progress {
            flex: 1;
            height: 100px;
            background-color: #e62828;
            box-shadow: 0 0 10px #e62828, 0 0 20px #8a1010;
        }
        .progress-fill {
            height: 100%;
            width: 50%;
            background-color: #5dd95d;
            box-shadow: 0 0 10px #5dd95d, 0 0 20px #2a8a2a;
        }
        .countdown {
            position: absolute;
            left: 0;
            right: 0;
            bottom: calc(100% + 10px);
            font-size: clamp(20px, 7vw, 72px);
            letter-spacing: clamp(1.5px, 0.6vw, 6px);
            color: #ff4040;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #cc0000;
            white-space: nowrap;
        }
        .countdown .label {
            display: block;
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 8px;
            color: #ff6060;
            text-shadow: 0 0 6px #cc0000;
        }
        @media (max-width: 768px) {
            body { padding-top: 12px; }
            h1 {
                font-size: 64px;
                margin: 0 0 10px 0;
            }
            .subtitle {
                font-size: 18px;
                letter-spacing: 1.5px;
                margin: 0 0 32px 0;
                padding: 0 8px;
            }
            .row {
                width: 99%;
                gap: 0;
            }
            .row img {
                height: 40px;
            }
            .progress {
                height: 40px;
            }
            .countdown {
                bottom: calc(100% + 6px);
            }
        }
        @media (max-width: 420px) {
            h1 { font-size: 52px; }
            .subtitle { font-size: 14px; letter-spacing: 1px; margin-bottom: 26px; }
            .row img { height: 32px; }
            .progress { height: 32px; }
        }
    </style>
</head>
<body>
    <h1>ALERT</h1>
    <div class="subtitle">
        <div><span id="subtitle-1">CRISIS POINT REACHED</span></div>
        <div><span id="subtitle-2">STATUS ALERT SYSTEM ACTIVE</span></div>
    </div>
    <div class="row">
        <div class="countdown">
            <span id="countdown-value">--</span>
        </div>
        <img src="Varjan.png" alt="Varjan">
        <div class="progress">
            <div class="progress-fill"></div>
        </div>
        <img src="Kronos.png" alt="Kronos">
    </div>
    <script>
        try {
            const nav = performance.getEntriesByType('navigation')[0];
            if (nav && nav.transferSize === 0) {
                const url = new URL(location.href);
                url.searchParams.set('_cb', Date.now());
                location.replace(url.toString());
            }
        } catch (e) {}
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) location.reload();
        });

        const fill = document.querySelector('.progress-fill');
        const center = 50;
        const swing = 1;
        function wobble() {
            const target = center + (Math.random() * 2 - 1) * swing;
            const duration = 120 + Math.random() * 280;
            fill.style.transition = `width ${duration}ms ease-in-out`;
            fill.style.width = target + '%';
            setTimeout(wobble, duration);
        }
        wobble();

        const target = new Date('2026-05-30T14:00:00+01:00').getTime();
        const cdEl = document.getElementById('countdown-value');
        const pad = (n, w) => String(n).padStart(w, '0');
        function tick() {
            let diff = target - Date.now();
            if (diff < 0) diff = 0;
            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            const cs = Math.floor((diff % 1000) / 10);
            cdEl.textContent = `${days} ${pad(hours,2)}:${pad(minutes,2)}:${pad(seconds,2)}.${pad(cs,2)}`;
            requestAnimationFrame(tick);
        }
        tick();

        const sub1 = document.getElementById('subtitle-1');
        const sub2 = document.getElementById('subtitle-2');
        function fitSubtitle() {
            sub2.style.transform = 'none';
            const w1 = sub1.getBoundingClientRect().width;
            const w2 = sub2.getBoundingClientRect().width;
            if (w2 > 0) sub2.style.transform = `scaleX(${w1 / w2})`;
        }
        fitSubtitle();
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(fitSubtitle);
        }
        window.addEventListener('resize', fitSubtitle);
    </script>
</body>
</html>
