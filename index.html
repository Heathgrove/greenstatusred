<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Page</title>
    <style>
        body {
            background-color: black;
            color: red;
            font-family: 'Arial', sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 80px;
            text-shadow: 0 0 5px red, 0 0 10px red, 0 0 15px darkred;
            filter: drop-shadow(0 0 10px red);
            animation: glow 1s infinite alternate;
        }
        @keyframes glow {
            0% { text-shadow: 0 0 5px red, 0 0 10px red, 0 0 15px darkred; }
            100% { text-shadow: 0 0 20px red, 0 0 30px darkred, 0 0 40px crimson; }
        }
    </style>
</head>
<body>
    <h1>STATUS</h1>
</body>
</html>
